{% extends "base.html" %}

{% block title %}Manage Books - BookShare{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="h3">Manage Books</h2>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 table-striped">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">ID</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Owner</th>
                        <th>Status</th>
                        <th class="text-end pe-3">Actions</th>
                    </tr>
                </thead>
                <tbody class="table-group-divider">
                    {% for book in books %}
                    <tr>
                        <td class="px-3 text-muted">#{{ book.id }}</td>
                        <td>
                            <a href="{{ url_for('books.detail', book_id=book.id) }}" class="text-decoration-none fw-bold text-dark">
                                {{ book.title }}
                            </a>
                        </td>
                        <td>{{ book.author }}</td>
                        <td>
                            <a href="{{ url_for('profile.view', user_id=book.owner_id) }}" class="text-decoration-none">
                                {{ book.owner.name }}
                            </a>
                        </td>
                        <td>
                            <span class="badge {% if book.status == 'available' %}bg-info{% else %}bg-warning text-dark{% endif %} text-capitalize">
                                {{ book.status }}
                            </span>
                        </td>
                        <td class="text-end pe-3">
                            <form action="{{ url_for('books.delete', book_id=book.id) }}" method="POST" class="d-inline" onsubmit="return confirm('Delete this book listing?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
