{% extends "base.html" %}

{% block title %}Add Book - Book Sharing Platform{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Add New Book</h2>
    <form action="{{ url_for('books.add') }}" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">Book Title</label>
            <input type="text" id="title" name="title" required>
        </div>
        <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" required>
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
                <option value="Programming">Programming</option>
                <option value="Fiction">Fiction</option>
                <option value="Science">Science</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Book Type</label>
            <div style="display: flex; gap: 1rem;">
                <label style="display: flex; align-items: center; width: auto;">
                    <input type="radio" name="book_type" value="physical" checked style="width: auto; margin-right: 0.5rem;"> Physical
                </label>
                <label style="display: flex; align-items: center; width: auto;">
                    <input type="radio" name="book_type" value="digital" style="width: auto; margin-right: 0.5rem;"> Digital
                </label>
            </div>
        </div>
        
        <div id="physical-fields">
            <div class="form-group">
                <label for="location_notes">Pickup Location Notes</label>
                <input type="text" id="location_notes" name="location_notes" placeholder="e.g. Near Main Gate">
            </div>
        </div>

        <div id="digital-fields" class="hidden">
            <div class="form-group">
                <label for="file">Upload Book File (.pdf, .epub, .txt)</label>
                <input type="file" id="file" name="file">
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4"></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">Add Book</button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.querySelectorAll('input[name="book_type"]').forEach(radio => {
    radio.addEventListener('change', function() {
        const physical = document.getElementById('physical-fields');
        const digital = document.getElementById('digital-fields');
        if (this.value === 'physical') {
            physical.classList.remove('hidden');
            digital.classList.add('hidden');
        } else {
            physical.classList.add('hidden');
            digital.classList.remove('hidden');
        }
    });
});
</script>
{% endblock %}
